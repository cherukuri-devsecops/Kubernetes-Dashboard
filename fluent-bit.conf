[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

# Tail all Docker container logs from the host
[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    Tag               docker.*
    Refresh_Interval  5
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

# Forward to Loki
[OUTPUT]
    Name             loki
    Match            docker.*
    Host             loki
    Port             3100
    Labels           job=fluent-bit, source=docker
    Label_Keys       $container_name,$image_name
    Line_Format      json
    Remove_Keys      time
