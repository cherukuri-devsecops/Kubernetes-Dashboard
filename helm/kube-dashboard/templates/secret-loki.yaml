{{- if and .Values.loki.enabled (not .Values.loki.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kube-dashboard.fullname" . }}-loki-s3
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-dashboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  LOKI_S3_ENDPOINT: {{ .Values.loki.s3.endpoint | quote }}
  LOKI_S3_BUCKET: {{ .Values.loki.s3.bucket | quote }}
  LOKI_S3_REGION: {{ .Values.loki.s3.region | quote }}
  LOKI_S3_ACCESS_KEY_ID: {{ .Values.loki.s3.accessKeyId | quote }}
  LOKI_S3_SECRET_ACCESS_KEY: {{ .Values.loki.s3.secretAccessKey | quote }}
{{- end }}
