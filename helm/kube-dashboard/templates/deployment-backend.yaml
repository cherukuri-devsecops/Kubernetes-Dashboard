{{- if .Values.backendService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kube-dashboard.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-dashboard.labels" . | nindent 4 }}
    {{- include "kube-dashboard.selectorLabels" (dict "root" . "component" "backend-service") | nindent 4 }}
spec:
  replicas: {{ .Values.backendService.replicaCount }}
  selector:
    matchLabels:
      {{- include "kube-dashboard.selectorLabels" (dict "root" . "component" "backend-service") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kube-dashboard.labels" . | nindent 8 }}
        {{- include "kube-dashboard.selectorLabels" (dict "root" . "component" "backend-service") | nindent 8 }}
    spec:
      # ServiceAccount grants in-cluster K8s API access (replaces kubeconfig mount)
      serviceAccountName: {{ include "kube-dashboard.backendServiceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: backend-service
          image: "{{ .Values.backendService.image.repository }}:{{ .Values.backendService.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backendService.port }}
              protocol: TCP
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: LOG_LEVEL
              value: {{ .Values.backendService.env.logLevel | quote }}
            - name: CLUSTER_SCOPE
              value: {{ .Values.backendService.env.clusterScope | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.backendService.env.otelServiceName | quote }}
            - name: SQLITE_PATH
              value: /data/dashboard.db
            - name: LOKI_URL
              value: "http://{{ include "kube-dashboard.fullname" . }}-loki:{{ .Values.loki.port }}"
            - name: PROMETHEUS_URL
              value: "http://{{ include "kube-dashboard.fullname" . }}-prometheus:{{ .Values.prometheus.port }}"
            - name: TEMPO_URL
              value: "http://{{ include "kube-dashboard.fullname" . }}-tempo:{{ .Values.tempo.httpPort }}"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://{{ include "kube-dashboard.fullname" . }}-tempo:{{ .Values.tempo.otlpGrpcPort }}"
            - name: UI_ORIGIN
              value: "http://{{ include "kube-dashboard.fullname" . }}-ui:{{ .Values.uiService.port }}"
          volumeMounts:
            - name: sqlite-data
              mountPath: /data
          livenessProbe:
            {{- toYaml .Values.backendService.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.backendService.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.backendService.resources | nindent 12 }}
      volumes:
        - name: sqlite-data
          {{- if .Values.sqlite.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.sqlite.persistence.existingClaim | default (printf "%s-sqlite" (include "kube-dashboard.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
