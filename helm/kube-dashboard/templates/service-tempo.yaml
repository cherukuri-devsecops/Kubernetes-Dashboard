{{- if .Values.tempo.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kube-dashboard.fullname" . }}-tempo
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-dashboard.labels" . | nindent 4 }}
spec:
  type: {{ .Values.tempo.service.type }}
  selector:
    {{- include "kube-dashboard.baseSelector" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.tempo.service.httpPort }}
      targetPort: {{ .Values.tempo.httpPort }}
      protocol: TCP
    - name: otlp-grpc
      port: {{ .Values.tempo.service.otlpGrpcPort }}
      targetPort: {{ .Values.tempo.otlpGrpcPort }}
      protocol: TCP
{{- end }}
