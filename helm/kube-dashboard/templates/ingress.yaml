{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kube-dashboard.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-dashboard.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- $class := include "kube-dashboard.ingressClassName" . }}
  {{- if $class }}
  ingressClassName: {{ $class }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "kube-dashboard.fullname" . }}-ui
                port:
                  name: http
    # No-host rule: allows direct IP access (e.g. http://10.0.0.244/health)
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "kube-dashboard.fullname" . }}-ui
                port:
                  name: http
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
{{- end }}
