{{- if and .Values.prometheus.enabled .Values.prometheus.persistence.enabled (not .Values.prometheus.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "kube-dashboard.fullname" . }}-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-dashboard.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.prometheus.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.prometheus.persistence.size }}
  {{- if .Values.prometheus.persistence.storageClass }}
  storageClassName: {{ .Values.prometheus.persistence.storageClass }}
  {{- else if .Values.nfs.server }}
  storageClassName: ""
  volumeName: {{ include "kube-dashboard.fullname" . }}-prometheus
  {{- end }}
  {{- /* If neither storageClass nor nfs.server is set, omit storageClassName to use the cluster default */ -}}
{{- end }}
