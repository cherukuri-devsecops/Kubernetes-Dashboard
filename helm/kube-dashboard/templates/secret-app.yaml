apiVersion: v1
kind: Secret
metadata:
  name: kube-dashboard-app-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-dashboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  AUTH_JWT_SECRET: {{ .Values.secrets.authJwtSecret | quote }}
  AUTH_SERVICE_URL: {{ .Values.secrets.authServiceUrl | quote }}
  OAUTH_REDIRECT_URI: {{ .Values.secrets.oauthRedirectUri | quote }}
  ALLOWED_EMAILS: {{ .Values.secrets.allowedEmails | quote }}
