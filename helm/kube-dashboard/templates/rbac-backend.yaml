{{- if and .Values.backendService.enabled .Values.backendService.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kube-dashboard.backendServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-dashboard.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube-dashboard.fullname" . }}-backend
  labels:
    {{- include "kube-dashboard.labels" . | nindent 4 }}
rules:
  {{- toYaml .Values.backendService.rbac.rules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kube-dashboard.fullname" . }}-backend
  labels:
    {{- include "kube-dashboard.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kube-dashboard.fullname" . }}-backend
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-dashboard.backendServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
