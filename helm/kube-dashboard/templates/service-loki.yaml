{{- if .Values.loki.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kube-dashboard.fullname" . }}-loki
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-dashboard.labels" . | nindent 4 }}
spec:
  type: {{ .Values.loki.service.type }}
  selector:
    {{- include "kube-dashboard.baseSelector" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.loki.service.port }}
      targetPort: {{ .Values.loki.port }}
      protocol: TCP
{{- end }}
