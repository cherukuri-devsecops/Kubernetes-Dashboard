{{- if and .Values.ingress.enabled .Values.ingress.bundledController.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kube-dashboard.fullname" . }}-ingress-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-dashboard.labels" . | nindent 4 }}
    {{- include "kube-dashboard.selectorLabels" (dict "root" . "component" "ingress-controller") | nindent 4 }}
  {{- if and (eq .Values.ingress.bundledController.service.type "LoadBalancer") .Values.ingress.bundledController.service.loadBalancerIP }}
  annotations:
    metallb.io/loadBalancerIPs: {{ .Values.ingress.bundledController.service.loadBalancerIP | quote }}
  {{- end }}
spec:
  type: {{ .Values.ingress.bundledController.service.type }}
  selector:
    {{- include "kube-dashboard.baseSelector" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
      {{- if and (eq .Values.ingress.bundledController.service.type "NodePort") .Values.ingress.bundledController.service.nodePort }}
      nodePort: {{ .Values.ingress.bundledController.service.nodePort }}
      {{- end }}
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
      {{- if and (eq .Values.ingress.bundledController.service.type "NodePort") .Values.ingress.bundledController.service.httpsNodePort }}
      nodePort: {{ .Values.ingress.bundledController.service.httpsNodePort }}
      {{- end }}
{{- end }}
