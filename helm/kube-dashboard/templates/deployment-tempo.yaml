{{- if .Values.tempo.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kube-dashboard.fullname" . }}-tempo
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-dashboard.labels" . | nindent 4 }}
    {{- include "kube-dashboard.selectorLabels" (dict "root" . "component" "tempo") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "kube-dashboard.selectorLabels" (dict "root" . "component" "tempo") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kube-dashboard.labels" . | nindent 8 }}
        {{- include "kube-dashboard.selectorLabels" (dict "root" . "component" "tempo") | nindent 8 }}
    spec:
      containers:
        - name: tempo
          image: "{{ .Values.tempo.image.repository }}:{{ .Values.tempo.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - -config.file=/etc/tempo/config.yaml
          ports:
            - name: http
              containerPort: {{ .Values.tempo.httpPort }}
              protocol: TCP
            - name: otlp-grpc
              containerPort: {{ .Values.tempo.otlpGrpcPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/tempo/config.yaml
              subPath: config.yaml
          resources:
            {{- toYaml .Values.tempo.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "kube-dashboard.fullname" . }}-tempo-config
{{- end }}
