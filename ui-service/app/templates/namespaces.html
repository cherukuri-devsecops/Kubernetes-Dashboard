{% extends "base.html" %}
{% block content %}
<div class="page-head"><h1>Namespaces <span style="font-size:14px;font-weight:400;color:var(--faint)">{{ namespaces|length }}</span></h1></div>
<div class="table-wrap">
  <table>
    <thead><tr><th>Name</th><th>Status</th><th>Age</th></tr></thead>
    <tbody>
    {% for n in namespaces %}
    {% set ph = n.status.phase %}
    <tr>
      <td><a class="row-link" href="/pods?ns={{ n.metadata.name }}">{{ n.metadata.name }}</a></td>
      <td><span class="dot {{ 'ok' if ph == 'Active' else 'warn' }}"></span>{{ ph }}</td>
      <td style="color:var(--faint)">{{ age(n.metadata.creation_timestamp) }}</td>
    </tr>
    {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
